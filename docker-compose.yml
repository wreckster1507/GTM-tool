version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-beacon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-beacon_dev}
      POSTGRES_DB: ${DB_NAME:-beacon_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-beacon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      SYNC_DATABASE_URL: postgresql://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/entrypoint.sh"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      SYNC_DATABASE_URL: postgresql://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      SYNC_DATABASE_URL: postgresql://${DB_USER:-beacon}:${DB_PASSWORD:-beacon_dev}@postgres:5432/${DB_NAME:-beacon_crm}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
