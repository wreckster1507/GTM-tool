services:
  - type: web
    name: beacon-crm-api
    runtime: python
    plan: starter
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: HUNTER_API_KEY
        sync: false
      - key: INSTANTLY_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_MODEL_SIMPLE
        sync: false
      - key: CLAUDE_MODEL_STANDARD
        sync: false
      - key: CLAUDE_MODEL_COMPLEX
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
