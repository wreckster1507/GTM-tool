{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beacon.fullname" . }}-postgres
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
    {{- include "beacon.selectorLabels" (dict "context" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgres.port }}
      targetPort: {{ .Values.postgres.port }}
      protocol: TCP
      name: postgres
  selector:
    {{- include "beacon.selectorLabels" (dict "context" . "component" "postgres") | nindent 4 }}
{{- end }}
