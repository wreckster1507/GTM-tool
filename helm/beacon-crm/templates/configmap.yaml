apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "beacon.fullname" . }}-config
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
data:
  ENVIRONMENT: {{ .Values.backend.env.ENVIRONMENT | quote }}
  JWT_EXPIRE_MINUTES: {{ .Values.backend.env.JWT_EXPIRE_MINUTES | quote }}
  CLAUDE_MODEL_SIMPLE: {{ .Values.backend.env.CLAUDE_MODEL_SIMPLE | quote }}
  CLAUDE_MODEL_STANDARD: {{ .Values.backend.env.CLAUDE_MODEL_STANDARD | quote }}
  CLAUDE_MODEL_COMPLEX: {{ .Values.backend.env.CLAUDE_MODEL_COMPLEX | quote }}
  RESEND_FROM_EMAIL: {{ .Values.backend.env.RESEND_FROM_EMAIL | quote }}
  CORS_ORIGINS: {{ printf "https://%s" .Values.ingress.host | quote }}
  GOOGLE_REDIRECT_URI: {{ printf "https://%s/api/v1/auth/google/callback" .Values.ingress.host | quote }}
  FRONTEND_URL: {{ printf "https://%s" .Values.ingress.host | quote }}
