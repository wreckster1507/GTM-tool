apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beacon.fullname" . }}-backend
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
    {{- include "beacon.selectorLabels" (dict "context" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "beacon.selectorLabels" (dict "context" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "beacon.selectorLabels" (dict "context" . "component" "backend") | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: run-migrations
          image: {{ include "beacon.image" (dict "image" .Values.backend.image "global" .Values.global) }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ include "beacon.fullname" . }}-secret
            - configMapRef:
                name: {{ include "beacon.fullname" . }}-config
          env:
            - name: DATABASE_URL
              value: {{ include "beacon.databaseUrl" . }}
            - name: SYNC_DATABASE_URL
              value: {{ include "beacon.syncDatabaseUrl" . }}
            - name: REDIS_URL
              value: {{ include "beacon.redisUrl" . }}
      containers:
        - name: backend
          image: {{ include "beacon.image" (dict "image" .Values.backend.image "global" .Values.global) }}
          command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "beacon.fullname" . }}-secret
            - configMapRef:
                name: {{ include "beacon.fullname" . }}-config
          env:
            - name: DATABASE_URL
              value: {{ include "beacon.databaseUrl" . }}
            - name: SYNC_DATABASE_URL
              value: {{ include "beacon.syncDatabaseUrl" . }}
            - name: REDIS_URL
              value: {{ include "beacon.redisUrl" . }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
