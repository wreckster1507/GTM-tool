{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "beacon.fullname" . }}-redis
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
    {{- include "beacon.selectorLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
      protocol: TCP
      name: redis
  selector:
    {{- include "beacon.selectorLabels" (dict "context" . "component" "redis") | nindent 4 }}
{{- end }}
