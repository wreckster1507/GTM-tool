apiVersion: v1
kind: Secret
metadata:
  name: {{ include "beacon.fullname" . }}-secret
  labels:
    {{- include "beacon.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USER: {{ .Values.secrets.dbUser | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  DB_NAME: {{ .Values.secrets.dbName | quote }}
  SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.secrets.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secrets.googleClientSecret | quote }}
  APOLLO_API_KEY: {{ .Values.secrets.apolloApiKey | quote }}
  HUNTER_API_KEY: {{ .Values.secrets.hunterApiKey | quote }}
  BUILTWITH_API_KEY: {{ .Values.secrets.builtwithApiKey | quote }}
  INSTANTLY_API_KEY: {{ .Values.secrets.instantlyApiKey | quote }}
  FIREFLIES_API_KEY: {{ .Values.secrets.firefliesApiKey | quote }}
  NEWS_API_KEY: {{ .Values.secrets.newsApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  CLAUDE_API_KEY: {{ .Values.secrets.claudeApiKey | quote }}
  RESEND_API_KEY: {{ .Values.secrets.resendApiKey | quote }}
