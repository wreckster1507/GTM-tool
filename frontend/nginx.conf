server {
  listen 80;
  server_name _;

  client_max_body_size 50M;

  root /usr/share/nginx/html;
  index index.html;

  

  # SPA fallback — serves index.html for all frontend routes so
  # client-side routing (React Router) works on refresh/direct navigation.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
