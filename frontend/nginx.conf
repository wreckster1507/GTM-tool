server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API and backend routes to the FastAPI backend container.
  # This lets the frontend use relative URLs (same origin) so a single
  # ngrok tunnel on port 8080 exposes the entire app.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://backend:8000;
  }

  location /docs {
    proxy_pass http://backend:8000;
  }

  location /redoc {
    proxy_pass http://backend:8000;
  }

  location /openapi.json {
    proxy_pass http://backend:8000;
  }

  # SPA fallback — serves index.html for all frontend routes so
  # client-side routing (React Router) works on refresh/direct navigation.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
