server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy all /api/ requests to the FastAPI backend.
  # This ensures auth flows (Google OAuth redirects) and all API calls
  # go to the backend even when the browser is on port 8080.
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Allow redirects (e.g. Google OAuth) to pass through unchanged
    proxy_redirect off;
  }

  # SPA fallback — serves index.html for all frontend routes so
  # client-side routing (React Router) works on refresh/direct navigation.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
