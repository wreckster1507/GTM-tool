server {
  listen 80;
  server_name _;

  client_max_body_size 50M;

  root /usr/share/nginx/html;
  index index.html;



  # Hashed asset files — safe to cache forever because filename changes on every build.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html must never be cached so new JS bundles are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # SPA fallback — serves index.html for all frontend routes so
  # client-side routing (React Router) works on refresh/direct navigation.
  location / {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
